name: Gleam CI

on:
  permissions: contents: read
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/gleam-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
  permissions: contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Erlang/OTP and Gleam
        uses: erlef/setup-beam@53eca37a5015e5c7075c3d9b4b08705001f35835 # v1.18.2
        with:
          otp-version: '26.0'
  permissions: contents: read
          gleam-version: '1.6.3'
  permissions: contents: read

      - name: Cache Gleam build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.0.1
        with:
          path: |
            backend/build
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-${{ hashFiles('backend/gleam.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-

      - name: Download dependencies
        run: gleam deps download

      - name: Build
        run: gleam build

      - name: Run tests
        run: gleam test

      - name: Check formatting
        run: gleam format --check src test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
  permissions: contents: read
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Docker image
        run: |
          docker build -t candy-crash-backend:${{ github.sha }} -f backend/Dockerfile backend/
